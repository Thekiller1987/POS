# Netlify configuration file for PosRápido POS PWA

[[headers]]
  for = "/*"
  [headers.values]
    # Standard security headers
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    # Basic caching rule for static assets
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/index.html"
  [headers.values]
    # Prevent caching of index.html so updates are immediately noticed
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    # CRITICAL: Prevent browser caching of the Service Worker itself
    Cache-Control = "no-cache, no-store, must-revalidate"
